name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest flake8

      - name: Lint
        run: flake8 server.py gps-time-bridge.py --max-line-length=120 --ignore=E501,W291,W293,W503,E301,E303,E704

      - name: Run tests
        run: python -m pytest tests/ -v

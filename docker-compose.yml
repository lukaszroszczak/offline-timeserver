services:
  timeserver:
    build: .
    image: offline-timeserver:latest
    container_name: offline-timeserver
    restart: unless-stopped

    # host networking — obligatoryjne dla NTP (chrony serwuje UDP/123 bez NAT)
    # UWAGA: nie działa na macOS/Windows (Docker Desktop używa VM)
    network_mode: host

    # SYS_TIME: chrony musi ustawiać zegar systemowy hosta
    # SYS_NICE: chrony używa setpriority() dla precyzji
    cap_add:
      - SYS_TIME
      - SYS_NICE

    # Mapowanie urządzenia GPS USB
    # Zmień GPS_DEVICE w .env lub przez zmienną środowiskową powłoki:
    #   GPS_DEVICE=/dev/ttyUSB0 docker compose up -d
    devices:
      - "${GPS_DEVICE:-/dev/ttyACM0}:${GPS_DEVICE:-/dev/ttyACM0}"

    environment:
      GPS_DEVICE: "${GPS_DEVICE:-/dev/ttyACM0}"
      PORT: "${PORT:-80}"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASS: "${ADMIN_PASS:-admin}"
      SECRET_KEY: "${SECRET_KEY:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

    volumes:
      # Logi aplikacji (server.py, gpsd, chrony, gps-time-bridge)
      - timeserver-logs:/var/log/timeserver
      # Dane chrony (drift file, leap seconds cache) — trwałość między restartami
      - chrony-data:/var/lib/chrony

volumes:
  timeserver-logs:
  chrony-data:

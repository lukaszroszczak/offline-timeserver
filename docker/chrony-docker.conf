# chrony config dla Docker — bez PPS (GPIO) i bez rtcsync (RTC należy do hosta)

# Ustaw strefę skoków sekundowych z lokalnego systemu
leapsectz right/UTC

# Gdy czas odjechał, wykonaj szybkie kroki
makestep 1.0 3

# rtcsync wyłączone: RTC zegar sprzętowy zarządzany przez hosta, nie kontener
# rtcsync

# GPS przez gpsd SHM 0 (gps-time-bridge.py pisze do tego segmentu)
refclock SHM 0 refid GPS

# PPS wyłączone: wymaga /dev/pps0 i GPIO RPi, niedostępne na zwykłym Linux/Docker
# refclock PPS /dev/pps0 lock GPS refid PPS prefer

# Zezwól klientom w sieci LAN
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Gdy nie ma żadnych źródeł, zachowuj się jak lokalny lider (stratum 10)
local stratum 10

# Logi
logdir /var/log/chrony
